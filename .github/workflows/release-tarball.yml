name: "Release: attach packed umbrella tarball"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and attach the tarball to (must already have a GitHub Release)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm run build

      - name: Pack umbrella package
        id: pack
        working-directory: packages/qti-components
        run: |
          set -euo pipefail
          pnpm pack --pack-destination "$RUNNER_TEMP"
          tarball=$(ls -1 "$RUNNER_TEMP"/*.tgz | head -n1)
          if [ -z "$tarball" ] || [ ! -f "$tarball" ]; then
            echo "pnpm pack did not produce a tarball" >&2
            exit 1
          fi
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          ls -la "$tarball"

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "${{ steps.pack.outputs.tarball }}" --clobber --repo "$GITHUB_REPOSITORY"
